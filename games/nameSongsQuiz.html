<!DOCTYPE html>
<html>
<head>
    <title>Guess the Song</title>
    <link rel="stylesheet" href="nameSongStyle.css">
</head>

<body>

<h1>🎵 Guess the Song</h1>

<!-- Play button -->
<button onclick="playClip()">Play Clip</button>

<!-- Container for dynamic answer buttons -->
<div class="answers" id="answers"></div>

<!-- Messages and guesses -->
<p id="message"></p>
<p id="guesses"></p>

<!-- Next song button -->
<button onclick="nextSong()">Next Song</button>

<!-- Audio element -->
<audio id="song"></audio>

<!-- JavaScript -->
<script src="nameSongQuiz.js"></script>

</body>
</html>
